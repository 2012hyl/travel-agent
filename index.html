<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>旅行规划师 · AI Agent v3.5</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
    body{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);min-height:100vh;display:flex;justify-content:center;padding:20px}
    .container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
    .header{text-align:center;padding:30px 0 10px}
    .header h1{color:#fff;font-size:28px;font-weight:700}
    .header p{color:#a0a0b8;font-size:14px;margin-top:6px}
    .header .emoji{font-size:40px;display:block;margin-bottom:8px}
    .usage-badge{display:inline-block;background:rgba(255,255,255,0.1);padding:6px 14px;border-radius:20px;color:#f39c12;font-size:12px;margin-top:8px}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
    .card-title{color:#e0e0e0;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    .form-group label{color:#b0b0c0;font-size:13px;font-weight:500}
    .form-group input,.form-group select{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all 0.2s}
    .form-group select option{background:#1a1a2e;color:#fff}
    .tag-group{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:#b0b0c0;font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none}
    .tag:hover{border-color:#4a9eff;color:#fff}
    .tag.selected{background:#4a9eff;border-color:#4a9eff;color:#fff}
    .people-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .people-row input{width:60px;text-align:center}
    .people-row span{color:#b0b0c0;font-size:13px}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg, #4a9eff, #6c5ce7);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(74,158,255,0.3)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
    .btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#e0e0e0;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:10px}
    .btn-secondary:hover{background:rgba(255,255,255,0.12)}
    .loading{display:none;text-align:center;padding:40px}
    .loading.active{display:block}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{display:none}
    .result.active{display:block}
    .result-content{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;color:#e0e0e0;line-height:1.8;font-size:14px}
    .result-content h1{color:#4a9eff;font-size:22px;margin:20px 0 12px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:8px}
    .result-content h2{color:#6c5ce7;font-size:18px;margin:18px 0 10px}
    .result-content h3{color:#a29bfe;font-size:15px;margin:14px 0 8px}
    .result-content ul,.result-content ol{padding-left:20px;margin:8px 0}
    .result-content strong{color:#ffd700}
    .result-content table{width:100%;border-collapse:collapse;margin:12px 0}
    .result-content th,.result-content td{border:1px solid rgba(255,255,255,0.15);padding:8px 12px}
    .result-content th{background:rgba(74,158,255,0.2);color:#4a9eff}
    .tips{color:#888;font-size:12px;text-align:center;margin-top:8px}
    .date-row{display:flex;gap:10px;align-items:center}
    .date-row input{flex:1}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}.header h1{font-size:22px}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji">🧳</span>
    <h1>旅行规划师 v3.5</h1>
    <p>AI 智能规划 · PDF下载 · 付费无限次</p>
    <div class="usage-badge" id="usageBadge">🆓 今日剩余：3次</div>
  </div>

  <div class="card">
    <div class="card-title">📋 填写旅行信息</div>
    <div class="form-grid">
      <div class="form-group"><label>🏠 始发地</label><select id="from"><option value="">请选择</option></select></div>
      <div class="form-group"><label>🌍 目的地</label><select id="destination"><option value="">请选择</option></select></div>
      <div class="form-group"><label>💰 预算（元，最低100）</label><input type="number" id="budget" placeholder="如：5000" min="100"></div>
      <div class="form-group"><label>📅 出发日期</label><div class="date-row"><input type="date" id="startDate"><span>→</span><input type="date" id="endDate"></div><span style="color:#888;font-size:11px;margin-top:4px" id="dayCount">选择日期后自动计算天数</span></div>
      <div class="form-group full"><label>👥 出行人员</label><div class="people-row"><span>🧑成人</span><input type="number" id="adults" value="1" min="0" max="20"><span>👶小孩</span><input type="number" id="children" value="0" min="0" max="10"><span>👴老人</span><input type="number" id="elders" value="0" min="0" max="10"></div></div>
      <div class="form-group full"><label>🚄 城际交通</label><div class="tag-group" id="cityTags"><span class="tag" data-val="高铁">🚄高铁</span><span class="tag" data-val="飞机">✈️飞机</span><span class="tag" data-val="火车">🚂火车</span><span class="tag" data-val="自驾">🚗自驾</span><span class="tag" data-val="大巴">🚌大巴</span><span class="tag" data-val="邮轮">🚢邮轮</span></div></div>
      <div class="form-group full"><label>🚕 景点间交通</label><div class="tag-group" id="localTags"><span class="tag" data-val="地铁">🚇地铁</span><span class="tag" data-val="公交">🚌公交</span><span class="tag" data-val="打车">🚕打车</span><span class="tag" data-val="共享单车">🚲单车</span><span class="tag" data-val="步行">🚶步行</span><span class="tag" data-val="景区专线">🚐专线</span><span class="tag" data-val="租电动车">🛵电动车</span></div></div>
      <div class="form-group full"><label>🎯 旅行偏好</label><div class="tag-group" id="prefTags"><span class="tag" data-val="美食">🍜美食</span><span class="tag" data-val="拍照">📸拍照</span><span class="tag" data-val="购物">🛍️购物</span><span class="tag" data-val="自然风光">🏔️自然</span><span class="tag" data-val="历史文化">🏛️历史</span><span class="tag" data-val="冒险">🧗冒险</span><span class="tag" data-val="放松度假">🏖️度假</span><span class="tag" data-val="亲子">👶亲子</span></div></div>
    </div>
    <button class="btn-primary" id="planBtn" onclick="startPlan()">✨ 开始规划</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">AI 正在为你规划旅行方案……</div></div>

  <div class="result" id="result">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="justify-content:space-between"><span>📝 旅行方案</span><span style="font-size:12px;color:#888" id="resultMeta"></span></div>
      <div class="result-content" id="resultContent"></div>
      <button class="btn-secondary" onclick="downloadPDF()">📄 下载 PDF</button>
      <button class="btn-secondary" onclick="showPayPage()">💎 付费升级（无限次）</button>
      <button class="btn-secondary" onclick="window.location.reload()">🔄 重新规划</button>
    </div>
  </div>

  <p class="tips">💡 免费每天3次 · 付费无限次 · v3.5<br>⚠️ 虚拟商品一经售出概不退款</p>
</div>

<script>
const API_URL = 'https://51ai-1.pages.dev/api/proxy';
const FREE_LIMIT = 3;
const STORAGE_KEY = 'travel_data_v2';

const ALL_CITIES = ['北京','上海','广州','深圳','成都','重庆','杭州','武汉','西安','南京','长沙','天津','苏州','郑州','青岛','大连','厦门','昆明','三亚','哈尔滨','沈阳','济南','合肥','南昌','福州','贵阳','南宁','海口','拉萨','乌鲁木齐','香港','澳门','台北','东京','大阪','首尔','新加坡','曼谷','巴黎','伦敦','纽约','悉尼'];
(function(){ const f=document.getElementById('from'),d=document.getElementById('destination'); ALL_CITIES.forEach(c=>{f.add(new Option(c,c));d.add(new Option(c,c))}); })();
document.querySelectorAll('.tag').forEach(t=>t.addEventListener('click',function(){this.classList.toggle('selected')}));
(function(){ const s=document.getElementById('startDate'),e=document.getElementById('endDate'),d=document.getElementById('dayCount'); function u(){if(s.value&&e.value){const a=new Date(s.value),b=new Date(e.value),diff=Math.ceil((b-a)/86400000);d.textContent=diff>0?'共'+diff+'天':'日期不正确';if(diff<=0)e.value=''}} s.addEventListener('change',u);e.addEventListener('change',u); })();

function getData(){
  const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return {date:'',count:0,paid:false,activationCode:''};
  let d; try{d=JSON.parse(raw)}catch(e){d={}}
  const h=d._hash||'',c=(d.date||'')+(d.count||0)+(d.paid?'1':'0')+(d.activationCode||'');
  if(h!==btoa(c).slice(0,8)) d={date:'',count:0,paid:false,activationCode:''};
  const today=new Date().toLocaleDateString(); if(d.date!==today) d={date:today,count:0,paid:d.paid||false,activationCode:d.activationCode||''};
  return d;
}
function saveData(d){const c=(d.date||'')+(d.count||0)+(d.paid?'1':'0')+(d.activationCode||'');d._hash=btoa(c).slice(0,8);localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function updateBadge(){const d=getData(),b=document.getElementById('usageBadge');if(d.paid){b.textContent='💎 已付费·无限次';b.style.color='#2ecc71'}else{const r=FREE_LIMIT-d.count;b.textContent=r>0?`🆓 今日剩余：${r}次`:'🆓 今日次数已用完';if(r<=0)b.style.color='#e74c3c'}}
function checkQuota(){return getData().paid||getData().count<FREE_LIMIT}
function useQuota(){const d=getData();if(!d.paid){d.count++;saveData(d)}updateBadge()}

let pendingCode='',verifyAttempts=0,verifyChallenge='';

async function activatePaid(code,answer){
  const c=(code||'').toUpperCase().trim(),a=(answer||'').trim();
  if(verifyAttempts>=5){alert('验证次数过多，请刷新');return false}
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'activate',code:c,answer:a})});
    const d=await r.json();
    if(d.valid){verifyAttempts=0;const u=JSON.parse(localStorage.getItem('used_codes')||'[]');if(u.includes(c)){alert('码已被使用');return false}u.push(c);localStorage.setItem('used_codes',JSON.stringify(u));const dd=getData();dd.paid=true;dd.activationCode=c;saveData(dd);updateBadge();alert('激活成功！');return true}
    if(d.step===2){pendingCode=d.code;showVerify();return false}
    verifyAttempts++;alert((d.message||'失败')+'（剩余'+(5-verifyAttempts)+'次）');return false;
  }catch(e){alert('网络错误');return false}
}

function showVerify(){
  verifyChallenge='';const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  for(let i=0;i<5;i++) verifyChallenge+=chars[Math.floor(Math.random()*chars.length)];
  const div=document.createElement('div');
  div.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:10002;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center;position:relative"><button style="position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#fff" onclick="this.parentElement.parentElement.remove()">✕</button><h3 style="color:#fff;margin-bottom:12px">验证</h3><p style="color:#a0a0b8;font-size:13px;margin-bottom:4px">复制粘贴下方字符：</p><p style="color:#f39c12;font-size:22px;font-weight:700;margin:10px 0;letter-spacing:4px;user-select:all;background:rgba(255,255,255,0.05);padding:8px;border-radius:8px">${verifyChallenge}</p><input type="text" id="verifyAnswer" placeholder="粘贴验证字符" maxlength="10" style="width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:8px"><button class="btn-secondary" style="width:100%" onclick="handleVerify(this)">确认</button><button class="btn-secondary" style="width:100%;margin-top:4px" onclick="this.parentElement.parentElement.remove()">取消</button></div>`;
  document.body.appendChild(div);
}

async function handleVerify(btn){
  const a=document.getElementById('verifyAnswer').value.trim(); if(!a){alert('请粘贴验证字符');return}
  btn.disabled=true;btn.textContent='验证中…';
  const r=await activatePaid(pendingCode,verifyChallenge+'|'+a);
  if(r){document.querySelectorAll('[style*="z-index:10001"],[style*="z-index:10002"]').forEach(el=>el.remove())}
  else{btn.disabled=false;btn.textContent='确认'}
}

async function startPlan(){
  const from=document.getElementById('from').value,dest=document.getElementById('destination').value,budget=parseFloat(document.getElementById('budget').value),start=document.getElementById('startDate').value,end=document.getElementById('endDate').value,adults=parseInt(document.getElementById('adults').value)||0,total=adults+(parseInt(document.getElementById('children').value)||0)+(parseInt(document.getElementById('elders').value)||0);
  if(!from||!dest){alert('请选择始发地和目的地');return} if(from===dest){alert('始发地和目的地不能相同');return}
  if(!budget||budget<100){alert('预算至少100元');return} if(!start||!end){alert('请选择日期');return}
  if(new Date(start)<new Date(new Date().toDateString())){alert('出发日期不能是过去');return}
  if(total===0){alert('请至少添加1位出行人员');return}
  if(!checkQuota()){alert('今日免费次数已用完');showPayPage();return}

  const btn=document.getElementById('planBtn'),loading=document.getElementById('loading'),result=document.getElementById('result');
  btn.disabled=true;btn.textContent='规划中…';result.classList.remove('active');loading.classList.add('active');
  try{
    const gs=id=>{const r=[];document.querySelectorAll('#'+id+' .tag.selected').forEach(t=>r.push(t.dataset.val));return r};
    const opts={from,dest,budget,days:parseInt(document.getElementById('dayCount').textContent)||0,start,end,people:{adults,children:parseInt(document.getElementById('children').value)||0,elders:parseInt(document.getElementById('elders').value)||0,total},cityVehicles:gs('cityTags'),localVehicles:gs('localTags'),preferences:gs('prefTags')};
    const sys=`你是资深旅行规划师。按以下结构输出Markdown方案：## 🚄 城际交通（${opts.from}→${opts.dest}）| ## 🚕 景点间交通 | ## 📅 每日行程 | ## 💰 预算分配 | ## ⚠️ 注意事项 | ## 🎒 必备物品`;
    const usr=`出发：${opts.from}，目的：${opts.dest}，天数：${opts.days}天，预算：${opts.budget}元，人数：成人${opts.people.adults}小孩${opts.people.children}老人${opts.people.elders}，城际交通：${opts.cityVehicles.join('、')||'不限'}，景点间：${opts.localVehicles.join('、')||'不限'}，偏好：${opts.preferences.join('、')||'无'}，日期：${opts.start}至${opts.end}`;
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),40000);
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'deepseek-v4-flash',messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:0.7,max_tokens:3000,stream:true}),signal:ctrl.signal});
    clearTimeout(to);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'服务器错误'+res.status)}
    const reader=res.body.getReader();const decoder=new TextDecoder();let full='',buf='';
    while(true){const{done,value}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';for(const line of lines){const t=line.trim();if(!t||t==='data: [DONE]')continue;if(!t.startsWith('data: '))continue;try{const d=JSON.parse(t.slice(6));const delta=d.choices?.[0]?.delta?.content;if(delta)full+=delta}catch(e){}}}
    if(!full)throw new Error('AI返回为空');
    document.getElementById('resultContent').innerHTML=window.marked?marked.parse(full):'<pre>'+full+'</pre>';
    document.getElementById('resultMeta').textContent=`${opts.from}→${opts.dest}·${opts.days}天·${opts.people.total}人·${opts.budget}元`;
    useQuota();loading.classList.remove('active');result.classList.add('active');result.scrollIntoView({behavior:'smooth'});
  }catch(e){loading.classList.remove('active');if(e.name==='AbortError')alert('超时，请重试');else if(e.message.includes('服务器错误'))alert('服务器错误，请稍后重试');else alert('生成失败，请检查网络')}
  finally{btn.disabled=false;btn.textContent='✨ 重新规划'}
}

function downloadPDF(){const el=document.getElementById('resultContent');html2pdf().set({margin:[8,8,8,8],filename:'旅行方案_'+new Date().toLocaleDateString()+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save()}

function showPayPage(){
  const div=document.createElement('div');
  div.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:10001;display:flex;align-items:center;justify-content:center';
  div.innerHTML=`<div style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center;position:relative"><button style="position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#fff" onclick="this.parentElement.parentElement.remove()">✕</button><h3 style="color:#fff;margin-bottom:8px">付费升级</h3><p style="color:#f39c12;font-size:22px;font-weight:700">￥9.90 / 永久</p><p style="color:#a0a0b8;font-size:13px;margin:6px 0">无限次AI旅行规划 + PDF下载</p><div style="display:flex;gap:12px;justify-content:center;margin:12px 0"><div style="text-align:center"><p style="color:#aaa;font-size:11px">支付宝</p><img src="https://i.ibb.co/0yFnTKS0/IMG-7071.jpg" style="width:130px;height:130px;object-fit:contain;background:#fff;border-radius:8px;padding:4px"></div><div style="text-align:center"><p style="color:#aaa;font-size:11px">微信</p><img src="https://i.ibb.co/6KHXJx8/IMG-7069.jpg" style="width:130px;height:130px;object-fit:contain;background:#fff;border-radius:8px;padding:4px"></div></div><p style="color:#e74c3c;font-size:11px;margin:4px 0">虚拟商品一经售出概不退款</p><p style="color:#fff;font-size:13px;margin:8px 0">付款后截屏发给 <span style="color:#2ecc71">wxid_xccoegiluvnr12</span> 获取激活码</p><p style="color:#a0a0b8;font-size:12px;margin:8px 0">已有激活码？</p><input type="text" id="activateCode" placeholder="输入激活码" maxlength="20" style="width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:8px"><button class="btn-secondary" style="width:100%" onclick="activatePaid(document.getElementById('activateCode').value,'')">激活</button><button class="btn-secondary" style="width:100%;margin-top:4px" onclick="exportActivation()">导出激活</button><button class="btn-secondary" style="width:100%;margin-top:4px" onclick="importActivation()">导入激活</button><button class="btn-secondary" style="width:100%;margin-top:4px" onclick="this.parentElement.parentElement.remove()">关闭</button></div>`;
