<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API测试</title>
  <style>
    body{background:#1a1a2e;color:#fff;font-family:monospace;padding:30px;text-align:center}
    button{padding:14px 28px;margin:10px;font-size:16px;cursor:pointer;border:none;border-radius:8px;background:#4a9eff;color:#fff}
    button:active{background:#6c5ce7}
    pre{text-align:left;background:rgba(255,255,255,0.05);padding:16px;border-radius:8px;max-height:400px;overflow-y:auto;margin-top:16px}
  </style>
</head>
<body>
  <h2>🧪 API 测试</h2>
  <p>测试地址：<span id="apiUrl"></span></p>
  <button onclick="testAI()">🤖 测试AI调用</button>
  <button onclick="testActivate()">🔑 测试激活码验证</button>
  <button onclick="testOptions()">📡 测试OPTIONS预检</button>
  <pre id="result">点击按钮测试……</pre>

<script>
  // 改成你的旅行Agent域名
  const API = 'https://hyltravel-agent.pages.dev/api/proxy';
  document.getElementById('apiUrl').textContent = API;

  async function testAI(){
    document.getElementById('result').textContent = '测试AI调用中……';
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'deepseek-v4-flash',
          messages: [
            { role: 'system', content: '你是旅行规划师。' },
            { role: 'user', content: '推荐一个北京3日游方案，100字以内。' }
          ],
          temperature: 0.7,
          max_tokens: 300,
          stream: false
        })
      });
      const status = res.status;
      const text = await res.text();
      document.getElementById('result').textContent = `状态码: ${status}\n\n响应内容:\n${text.slice(0, 500)}`;
    } catch(e) {
      document.getElementById('result').textContent = '网络错误: ' + e.message;
    }
  }

  async function testActivate(){
    document.getElementById('result').textContent = '测试激活码验证中……';
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'activate',
          code: 'TRAVEL01',
          answer: ''
        })
      });
      const status = res.status;
      const text = await res.text();
      document.getElementById('result').textContent = `状态码: ${status}\n\n响应内容:\n${text.slice(0, 500)}`;
    } catch(e) {
      document.getElementById('result').textContent = '网络错误: ' + e.message;
    }
  }

  async function testOptions(){
    document.getElementById('result').textContent = '测试OPTIONS预检中……';
    try {
      const res = await fetch(API, { method: 'OPTIONS' });
      document.getElementById('result').textContent = `状态码: ${res.status}\n\nOPTIONS预检${res.ok ? '通过' : '失败'}`;
    } catch(e) {
      document.getElementById('result').textContent = '网络错误: ' + e.message;
    }
  }
</script>
</body>
</html>
