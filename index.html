<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>旅行规划师 · AI Agent v3.2</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
    body{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);min-height:100vh;display:flex;justify-content:center;padding:20px}
    .container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
    .header{text-align:center;padding:30px 0 10px}
    .header h1{color:#fff;font-size:28px;font-weight:700}
    .header p{color:#a0a0b8;font-size:14px;margin-top:6px}
    .header .emoji{font-size:40px;display:block;margin-bottom:8px}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
    .card-title{color:#e0e0e0;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    .form-group label{color:#b0b0c0;font-size:13px;font-weight:500}
    .form-group select,.form-group input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all 0.2s}
    .form-group select:focus,.form-group input:focus{border-color:#4a9eff;background:rgba(255,255,255,0.1)}
    .form-group select option{background:#1a1a2e;color:#fff}
    .tag-group{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:#b0b0c0;font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none}
    .tag:hover{border-color:#4a9eff;color:#fff}
    .tag.selected{background:#4a9eff;border-color:#4a9eff;color:#fff}
    .people-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .people-row input{width:60px;text-align:center}
    .people-row span{color:#b0b0c0;font-size:13px}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg, #4a9eff, #6c5ce7);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(74,158,255,0.3)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#e0e0e0;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:10px}
    .btn-secondary:hover{background:rgba(255,255,255,0.12)}
    .loading{display:none;text-align:center;padding:40px}
    .loading.active{display:block}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:#a0a0b8;font-size:14px}
    .result{display:none}
    .result.active{display:block}
    .result-content{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;color:#e0e0e0;line-height:1.8;font-size:14px}
    .result-content h1{color:#4a9eff;font-size:22px;margin:20px 0 12px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:8px}
    .result-content h2{color:#6c5ce7;font-size:18px;margin:18px 0 10px}
    .result-content h3{color:#a29bfe;font-size:15px;margin:14px 0 8px}
    .result-content ul,.result-content ol{padding-left:20px;margin:8px 0}
    .result-content li{margin:4px 0}
    .result-content strong{color:#ffd700}
    .result-content table{width:100%;border-collapse:collapse;margin:12px 0}
    .result-content th,.result-content td{border:1px solid rgba(255,255,255,0.15);padding:8px 12px;text-align:left}
    .result-content th{background:rgba(74,158,255,0.2);color:#4a9eff}
    .date-row{display:flex;gap:10px;align-items:center}
    .date-row input{flex:1}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}.header h1{font-size:22px}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji">🧳</span>
    <h1>旅行规划师 v3.2</h1>
    <p>AI 智能规划 · 城际交通 · 市内接驳 · PDF 下载</p>
  </div>

  <div class="card">
    <div class="card-title">📋 填写旅行信息</div>
    <div class="form-grid">
      <div class="form-group"><label>🏠 始发地</label><select id="from"><option value="">请选择</option></select></div>
      <div class="form-group"><label>🌍 目的地</label><select id="destination"><option value="">请选择</option></select></div>
      <div class="form-group"><label>💰 预算（元，最低100）</label><input type="number" id="budget" placeholder="如：5000" min="100"></div>
      <div class="form-group"><label>📅 日期范围</label><div class="date-row"><input type="date" id="startDate"><span>→</span><input type="date" id="endDate"></div><span style="color:#888;font-size:11px" id="dayCount">选择日期自动计算天数</span></div>
      <div class="form-group full"><label>👥 出行人员</label><div class="people-row"><span>🧑成人</span><input type="number" id="adults" value="1" min="0" max="20"><span>👶小孩</span><input type="number" id="children" value="0" min="0" max="10"><span>👴老人</span><input type="number" id="elders" value="0" min="0" max="10"></div></div>
      <div class="form-group full"><label>🚄 城际交通</label><div class="tag-group" id="cityTags"><span class="tag" data-val="高铁">🚄高铁</span><span class="tag" data-val="飞机">✈️飞机</span><span class="tag" data-val="火车">🚂火车</span><span class="tag" data-val="自驾">🚗自驾</span><span class="tag" data-val="大巴">🚌大巴</span></div></div>
      <div class="form-group full"><label>🚕 景点间交通</label><div class="tag-group" id="localTags"><span class="tag" data-val="地铁">🚇地铁</span><span class="tag" data-val="公交">🚌公交</span><span class="tag" data-val="打车">🚕打车</span><span class="tag" data-val="共享单车">🚲共享单车</span><span class="tag" data-val="步行">🚶步行</span><span class="tag" data-val="景区专线">🚐景区专线</span></div></div>
      <div class="form-group full"><label>🎯 旅行偏好</label><div class="tag-group" id="prefTags"><span class="tag" data-val="美食">🍜美食</span><span class="tag" data-val="拍照">📸拍照</span><span class="tag" data-val="购物">🛍️购物</span><span class="tag" data-val="自然风光">🏔️自然</span><span class="tag" data-val="历史文化">🏛️历史</span><span class="tag" data-val="放松度假">🏖️度假</span></div></div>
    </div>
    <button class="btn-primary" id="planBtn" onclick="startPlan()">✨ 开始规划</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">AI 正在规划旅行方案……</div></div>

  <div class="result" id="result">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="justify-content:space-between"><span>📝 旅行方案</span><span style="font-size:12px;color:#888" id="resultMeta"></span></div>
      <div class="result-content" id="resultContent"></div>
      <button class="btn-secondary" onclick="downloadPDF()">📄 下载 PDF</button>
      <button class="btn-secondary" onclick="window.location.reload()">🔄 重新规划</button>
    </div>
  </div>
</div>

<script>
const ALL_CITIES = ['北京','上海','广州','深圳','天津','重庆','哈尔滨','长春','沈阳','大连','呼和浩特','乌鲁木齐','拉萨','西宁','兰州','银川','西安','石家庄','太原','济南','青岛','烟台','威海','郑州','洛阳','开封','南京','苏州','无锡','常州','南通','扬州','徐州','杭州','宁波','温州','绍兴','嘉兴','湖州','金华','舟山','合肥','黄山','芜湖','南昌','九江','景德镇','福州','厦门','泉州','武夷山','武汉','宜昌','长沙','张家界','岳阳','凤凰','珠海','佛山','东莞','中山','惠州','汕头','湛江','南宁','桂林','北海','柳州','海口','三亚','万宁','陵水','成都','绵阳','乐山','峨眉山','九寨沟','稻城','康定','贵阳','遵义','安顺','黄果树','昆明','大理','丽江','香格里拉','西双版纳','腾冲','香港','澳门','台北','高雄','台中','台南','花莲','东京','大阪','京都','札幌','首尔','釜山','济州','新加坡','曼谷','清迈','普吉','芭提雅','吉隆坡','槟城','马六甲','河内','胡志明市','岘港','暹粒','金边','仰光','马尼拉','长滩岛','雅加达','巴厘岛','马尔代夫','迪拜','阿布扎比','伊斯坦布尔','伦敦','曼彻斯特','爱丁堡','巴黎','尼斯','里昂','柏林','慕尼黑','法兰克福','罗马','米兰','威尼斯','佛罗伦萨','巴塞罗那','马德里','里斯本','阿姆斯特丹','布鲁塞尔','苏黎世','日内瓦','维也纳','布拉格','布达佩斯','莫斯科','圣彼得堡','雅典','圣托里尼','纽约','洛杉矶','旧金山','拉斯维加斯','芝加哥','西雅图','波士顿','华盛顿','温哥华','多伦多','蒙特利尔','悉尼','墨尔本','布里斯班','黄金海岸','奥克兰','皇后镇','开罗','开普敦','约翰内斯堡','内罗毕','卡萨布兰卡'];

(function(){
  const from = document.getElementById('from'), dest = document.getElementById('destination');
  ALL_CITIES.forEach(c => { from.add(new Option(c,c)); dest.add(new Option(c,c)); });
})();

document.querySelectorAll('.tag').forEach(t => t.addEventListener('click', function(){ this.classList.toggle('selected'); }));

(function(){
  const s = document.getElementById('startDate'), e = document.getElementById('endDate'), d = document.getElementById('dayCount');
  function u(){ if(s.value&&e.value){ const diff = Math.ceil((new Date(e.value)-new Date(s.value))/86400000); d.textContent = diff>0 ? '共'+diff+'天' : '日期不正确'; } }
  s.addEventListener('change',u); e.addEventListener('change',u);
})();

function getSelected(id){ const r=[]; document.querySelectorAll('#'+id+' .tag.selected').forEach(t=>r.push(t.dataset.val)); return r; }

function validate(){
  const from=document.getElementById('from').value, dest=document.getElementById('destination').value;
  if(!from||!dest) return '请选择始发地和目的地';
  if(from===dest) return '始发地和目的地不能相同';
  const budget=parseFloat(document.getElementById('budget').value);
  if(!budget||budget<100) return '预算至少100元';
  if(!document.getElementById('startDate').value||!document.getElementById('endDate').value) return '请选择日期';
  const total=(parseInt(document.getElementById('adults').value)||0)+(parseInt(document.getElementById('children').value)||0)+(parseInt(document.getElementById('elders').value)||0);
  if(total===0) return '请至少添加1位出行人员';
  return null;
}

function getOptions(){
  return {
    from: document.getElementById('from').value,
    destination: document.getElementById('destination').value,
    budget: parseFloat(document.getElementById('budget').value)||0,
    days: parseInt(document.getElementById('dayCount').textContent)||0,
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value,
    people: { adults: parseInt(document.getElementById('adults').value)||0, children: parseInt(document.getElementById('children').value)||0, elders: parseInt(document.getElementById('elders').value)||0 },
    cityVehicles: getSelected('cityTags'),
    localVehicles: getSelected('localTags'),
    preferences: getSelected('prefTags')
  };
}

async function startPlan(){
  const err=validate(); if(err){ alert(err); return; }
  const btn=document.getElementById('planBtn'), loading=document.getElementById('loading'), result=document.getElementById('result');
  btn.disabled=true; btn.textContent='规划中…'; result.classList.remove('active'); loading.classList.add('active');
  try {
    const opts=getOptions();
    const controller=new AbortController(); const timeout=setTimeout(()=>controller.abort(),30000);
    const res=await fetch('/api/travel', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({options:opts}), signal:controller.signal });
    clearTimeout(timeout);
    if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.error||'服务器错误'); }
    const reader=res.body.getReader(), decoder=new TextDecoder(); let full='', buf='';
    while(true){ const{done,value}=await reader.read(); if(done) break; buf+=decoder.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop()||''; for(const line of lines){ const t=line.trim(); if(!t||t==='data: [DONE]') continue; if(!t.startsWith('data: ')) continue; try{ const d=JSON.parse(t.slice(6)); const delta=d.choices?.[0]?.delta?.content; if(delta) full+=delta; }catch(e){} } }
    if(!full) throw new Error('AI返回为空');
    document.getElementById('resultContent').innerHTML = window.marked ? marked.parse(full) : '<pre>'+full+'</pre>';
    document.getElementById('resultMeta').textContent = `${opts.from}→${opts.destination}·${opts.days}天·${opts.budget}元`;
    loading.classList.remove('active'); result.classList.add('active'); result.scrollIntoView({behavior:'smooth'});
  } catch(e){ loading.classList.remove('active'); alert('生成失败：'+(e.message||'网络错误')); }
  finally { btn.disabled=false; btn.textContent='✨ 重新规划'; }
}

function downloadPDF(){
  const el=document.getElementById('resultContent');
  html2pdf().set({margin:[8,8,8,8],filename:'旅行方案_'+new Date().toLocaleDateString()+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save();
}
</script>
</body>
</html>
