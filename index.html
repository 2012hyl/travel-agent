<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>旅行规划师 · 免费版</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
    body{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);min-height:100vh;display:flex;justify-content:center;padding:20px}
    .container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
    .header{text-align:center;padding:30px 0 10px}
    .header h1{color:#fff;font-size:28px;font-weight:700}
    .header p{color:#a0a0b8;font-size:14px;margin-top:6px}
    .header .emoji{font-size:40px;display:block;margin-bottom:8px}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
    .card-title{color:#e0e0e0;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    .form-group label{color:#b0b0c0;font-size:13px;font-weight:500}
    .form-group input,.form-group select{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all 0.2s}
    .form-group input:focus,.form-group select:focus{border-color:#4a9eff;background:rgba(255,255,255,0.1)}
    .form-group select option{background:#1a1a2e;color:#fff}
    .tag-group{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:#b0b0c0;font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none}
    .tag:hover{border-color:#4a9eff;color:#fff}
    .tag.selected{background:#4a9eff;border-color:#4a9eff;color:#fff}
    .people-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .people-row input{width:60px;text-align:center;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none}
    .people-row span{color:#b0b0c0;font-size:13px}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg, #4a9eff, #6c5ce7);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(74,158,255,0.3)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#e0e0e0;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:10px}
    .btn-secondary:hover{background:rgba(255,255,255,0.12)}
    .loading{display:none;text-align:center;padding:40px}
    .loading.active{display:block}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:#a0a0b8;font-size:14px}
    .result{display:none}
    .result.active{display:block}
    .result-content{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;color:#e0e0e0;line-height:1.8;font-size:14px}
    .result-content h1{color:#4a9eff;font-size:22px;margin:20px 0 12px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:8px}
    .result-content h2{color:#6c5ce7;font-size:18px;margin:18px 0 10px}
    .result-content h3{color:#a29bfe;font-size:15px;margin:14px 0 8px}
    .result-content ul,.result-content ol{padding-left:20px;margin:8px 0}
    .result-content li{margin:4px 0}
    .result-content strong{color:#ffd700}
    .tips{color:#888;font-size:12px;text-align:center;margin-top:8px}
    .date-row{display:flex;gap:10px;align-items:center}
    .date-row input{flex:1}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}.header h1{font-size:22px}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji">🧳</span>
    <h1>旅行规划师 · 免费版</h1>
    <p>四级联动选地点 · 智谱验证地名 · AI生成方案 · PDF下载</p>
  </div>

  <div class="card">
    <div class="card-title">📋 目的地</div>
    <div class="form-grid">
      <div class="form-group"><label>🌏 国家/区域</label><select id="country" onchange="onCountryChange()"><option value="">请选择</option></select></div>
      <div class="form-group"><label>🗺️ 省份/州</label><select id="province" onchange="onProvinceChange()"><option value="">请先选择国家</option></select></div>
      <div class="form-group"><label>🏙️ 城市</label><select id="city" onchange="onCityChange()"><option value="">请先选择省份</option></select></div>
      <div class="form-group"><label>📍 区/县（选填）</label><select id="district"><option value="">请先选择城市</option></select></div>
      <div class="form-group full"><label>🎯 具体景点（自由输入，逗号分隔）</label><input type="text" id="spots" placeholder="如：故宫、长城、颐和园" maxlength="200"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 行程信息</div>
    <div class="form-grid">
      <div class="form-group"><label>💰 预算（元，最低100）</label><input type="number" id="budget" placeholder="如：5000" min="100"></div>
      <div class="form-group"><label>📅 出发日期</label><div class="date-row"><input type="date" id="startDate"><span style="color:#a0a0b8">→</span><input type="date" id="endDate"></div><span style="color:#888;font-size:11px;margin-top:4px" id="dayCount">选择日期后自动计算天数</span></div>
      <div class="form-group full"><label>👥 出行人员</label><div class="people-row"><span>🧑 成人</span><input type="number" id="adults" value="1" min="0" max="20"><span>👶 小孩</span><input type="number" id="children" value="0" min="0" max="10"><span>👴 老人</span><input type="number" id="elders" value="0" min="0" max="10"></div></div>
      <div class="form-group full"><label>🚄 城际交通</label><div class="tag-group" id="cityTags"><span class="tag" data-val="高铁">🚄 高铁</span><span class="tag" data-val="飞机">✈️ 飞机</span><span class="tag" data-val="火车">🚂 火车</span><span class="tag" data-val="自驾">🚗 自驾</span><span class="tag" data-val="大巴">🚌 大巴</span></div></div>
      <div class="form-group full"><label>🚕 市内交通</label><div class="tag-group" id="localTags"><span class="tag" data-val="地铁">🚇 地铁</span><span class="tag" data-val="公交">🚌 公交</span><span class="tag" data-val="打车">🚕 打车</span><span class="tag" data-val="共享单车">🚲 共享单车</span><span class="tag" data-val="步行">🚶 步行</span><span class="tag" data-val="景区专线">🚐 景区专线</span></div></div>
      <div class="form-group full"><label>🎯 旅行偏好</label><div class="tag-group" id="prefTags"><span class="tag" data-val="美食">🍜 美食</span><span class="tag" data-val="拍照">📸 拍照</span><span class="tag" data-val="购物">🛍️ 购物</span><span class="tag" data-val="自然风光">🏔️ 自然风光</span><span class="tag" data-val="历史文化">🏛️ 历史文化</span><span class="tag" data-val="冒险">🧗 冒险</span><span class="tag" data-val="放松度假">🏖️ 放松度假</span><span class="tag" data-val="亲子">👶 亲子</span></div></div>
    </div>
    <button class="btn-primary" id="planBtn" onclick="startPlan()">✨ 开始规划</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">AI 正在规划……</div></div>

  <div class="result" id="result">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="justify-content:space-between"><span>📝 旅行方案</span><span style="font-size:12px;color:#888" id="resultMeta"></span></div>
      <div class="result-content" id="resultContent"></div>
      <button class="btn-secondary" onclick="downloadPDF()">📄 下载 PDF</button>
      <button class="btn-secondary" onclick="window.location.reload()">🔄 重新规划</button>
    </div>
  </div>

  <p class="tips">💡 AI 生成内容仅供参考，出行前请核实。</p>
</div>

<script>

// ==================== 四级联动 ====================
(function init(){
  const countrySelect = document.getElementById('country');
  countrySelect.innerHTML = '<option value="">请选择国家/区域</option>';
  Object.keys(TRAVEL_DATA).forEach(c => countrySelect.add(new Option(c, c)));
})();

function onCountryChange(){
  const country = document.getElementById('country').value;
  const provinceSelect = document.getElementById('province');
  provinceSelect.innerHTML = '<option value="">请选择</option>';
  document.getElementById('city').innerHTML = '<option value="">请先选择上级</option>';
  document.getElementById('district').innerHTML = '<option value="">请先选择上级</option>';
  if(country && TRAVEL_DATA[country]){
    Object.keys(TRAVEL_DATA[country]).forEach(p => provinceSelect.add(new Option(p, p)));
  }
}

function onProvinceChange(){
  const country = document.getElementById('country').value;
  const province = document.getElementById('province').value;
  const citySelect = document.getElementById('city');
  citySelect.innerHTML = '<option value="">请选择城市</option>';
  document.getElementById('district').innerHTML = '<option value="">请先选择上级</option>';
  if(country && province && TRAVEL_DATA[country][province]){
    Object.keys(TRAVEL_DATA[country][province]).forEach(c => citySelect.add(new Option(c, c)));
  }
}

function onCityChange(){
  const country = document.getElementById('country').value;
  const province = document.getElementById('province').value;
  const city = document.getElementById('city').value;
  const districtSelect = document.getElementById('district');
  districtSelect.innerHTML = '<option value="">请选择区/县（选填）</option>';
  if(country && province && city && TRAVEL_DATA[country][province][city]){
    TRAVEL_DATA[country][province][city].forEach(d => districtSelect.add(new Option(d, d)));
  }
}

// ==================== 标签 ====================
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', function(){ this.classList.toggle('selected'); });
});

// ==================== 日期 ====================
(function(){
  const start = document.getElementById('startDate'), end = document.getElementById('endDate'), dc = document.getElementById('dayCount');
  function update(){
    if(start.value && end.value){
      const diff = Math.ceil((new Date(end.value)-new Date(start.value))/86400000);
      dc.textContent = diff > 0 ? '共 '+diff+' 天' : '日期范围不正确';
      if(diff <= 0) end.value = '';
    }
  }
  start.addEventListener('change', update);
  end.addEventListener('change', update);
})();

// ==================== 验证 ====================
function validateForm(){
  const country = document.getElementById('country').value;
  const city = document.getElementById('city').value;
  const budget = parseFloat(document.getElementById('budget').value);
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const adults = parseInt(document.getElementById('adults').value)||0;
  const total = adults + (parseInt(document.getElementById('children').value)||0) + (parseInt(document.getElementById('elders').value)||0);
  if(!country || !city) return '请选择国家和城市';
  if(!budget || budget < 100) return '预算至少100元';
  if(!start || !end) return '请选择日期';
  if(new Date(start) < new Date(new Date().toDateString())) return '出发日期不能是过去';
  if(total === 0) return '请至少添加1人';
  return null;
}

function getSelected(id){ const r=[]; document.querySelectorAll('#'+id+' .tag.selected').forEach(t=>r.push(t.dataset.val)); return r; }

async function startPlan(){
  const err = validateForm(); if(err){ alert(err); return; }
  const btn = document.getElementById('planBtn'), loading = document.getElementById('loading'), result = document.getElementById('result');
  btn.disabled = true; btn.textContent = '规划中……'; result.classList.remove('active'); loading.classList.add('active');

  try {
    const country = document.getElementById('country').value;
    const province = document.getElementById('province').value;
    const city = document.getElementById('city').value;
    const district = document.getElementById('district').value;
    const spots = document.getElementById('spots').value.trim();
    const budget = parseFloat(document.getElementById('budget').value)||0;
    const days = parseInt(document.getElementById('dayCount').textContent)||0;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const adults = parseInt(document.getElementById('adults').value)||0;
    const children = parseInt(document.getElementById('children').value)||0;
    const elders = parseInt(document.getElementById('elders').value)||0;
    const totalPeople = adults+children+elders;
    const cityVehicles = getSelected('cityTags');
    const localVehicles = getSelected('localTags');
    const preferences = getSelected('prefTags');

    // 拼目的地
    let destination = country;
    if(province) destination += '·' + province;
    destination += '·' + city;
    if(district) destination += '·' + district;
    if(spots) destination += '（想去：' + spots + '）';

    // ===== 智谱验证地名合法性 =====
    const verifyPrompt = `请判断以下地名组合是否真实存在、是否合理。只回复"合法"或"不合法"。
国家：${country}
省份/州：${province || '无'}
城市：${city}
区/县：${district || '无'}
景点：${spots || '无'}
判断标准：国家和城市必须真实存在。省份和区县如果填写了，必须是该城市真实存在的行政区划。景点如果填写了，必须是该城市真实存在的景点。如果合理回复"合法"，否则回复"不合法"。`;

    const verifyRes = await fetch('https://51ai-1.pages.dev/api/proxy', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'glm-4-flash',
        messages: [{ role: 'system', content: verifyPrompt }, { role: 'user', content: '请判断。' }],
        temperature: 0.1, max_tokens: 10, stream: false
      })
    });
    const verifyData = await verifyRes.json();
    const verifyResult = verifyData.choices?.[0]?.message?.content?.trim() || '合法';

    if(verifyResult.includes('不合法')){
      loading.classList.remove('active');
      btn.disabled = false; btn.textContent = '✨ 开始规划';
      alert('⚠️ 智谱检测到地名可能不合法，请检查后重试。\n\n国家：'+country+'\n城市：'+city+(spots?'\n景点：'+spots:''));
      return;
    }

    // ===== AI规划 =====
    const systemPrompt = `你是资深旅行规划师。请为以下目的地生成完整旅行方案。

目的地：${destination}
预算：${budget}元 | 天数：${days}天
人数：成人${adults}人、小孩${children}人、老人${elders}人
日期：${startDate} 至 ${endDate}
城际交通：${cityVehicles.join('、') || '不限'}
市内交通：${localVehicles.join('、') || '不限'}
偏好：${preferences.join('、') || '无'}

请输出Markdown：🚄城际交通、🚕市内交通、📅每日行程、💰预算分配、⚠️注意事项、🎒必备物品。`;

    const planRes = await fetch('https://51ai-1.pages.dev/api/proxy', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: '请规划。' }],
        temperature: 0.7, max_tokens: 3000, stream: false
      })
    });
    const planData = await planRes.json();
    if(planData.error) throw new Error(planData.error);
    const md = planData.choices[0].message.content;

    document.getElementById('resultContent').innerHTML = marked.parse(md);
    document.getElementById('resultMeta').textContent = `${destination} · ${days}天 · ${totalPeople}人 · ${budget}元`;
    loading.classList.remove('active'); result.classList.add('active');
    result.scrollIntoView({ behavior:'smooth' });
  } catch(e){
    loading.classList.remove('active');
    alert('生成失败：' + (e.message || '网络错误'));
  }
  finally { btn.disabled = false; btn.textContent = '✨ 重新规划'; }
}

function downloadPDF(){
  const el = document.getElementById('resultContent');
  const origBg = el.style.background, origColor = el.style.color;
  el.style.background = '#fff'; el.style.color = '#333';
  html2pdf().set({margin:[10,10,10,10], filename:'旅行方案.pdf', image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save().then(()=>{el.style.background=origBg;el.style.color=origColor;});
}
